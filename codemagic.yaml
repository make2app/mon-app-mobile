workflows:
  android-build:
    name: Build Android App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: v18
    scripts:
      - name: Setup and Build
        script: |
          set -e
          echo ">>> Working dir: $(pwd)"
          npm install
          echo ">>> Init React Native template..."
          npx react-native@0.72.0 init RNBridge --skip-git-init --skip-install
          echo ">>> Copy android folder..."
          cp -r RNBridge/android ./android
          rm -rf RNBridge
          echo ">>> Contents:"
          ls -la
          echo ">>> Building APK..."
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
