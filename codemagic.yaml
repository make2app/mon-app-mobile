workflows:
  android-workflow:
    name: Build Android App
    environment:
      java: 17
    scripts:
      - name: Install Gradle
        script: |
          brew install gradle@8
          echo 'export PATH="/opt/homebrew/opt/gradle@8/bin:$PATH"' >> ~/.bash_profile
          source ~/.bash_profile
      - name: Build APK
        script: |
          export PATH="/opt/homebrew/opt/gradle@8/bin:$PATH"
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
