workflows:
  android-build:
    name: Build Android App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: 17
      node: v18
    scripts:
      - name: Setup and Build
        script: |
          set -e
          npm install
          npx cap add android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
