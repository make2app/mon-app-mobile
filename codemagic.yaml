workflows:
  android-build:
    name: Build Android App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Install Gradle
        script: |
          brew install gradle
      - name: Build APK
        script: |
          gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
