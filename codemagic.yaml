workflows:
  android-build:
    name: Build Android App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: v18
    scripts:
      - name: Initialize Android structure
        script: |
          npx react-native@0.72.0 init TemplateApp --skip-git-init --skip-install
          cp -r TemplateApp/android ./android
          rm -rf TemplateApp
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
